{% extends 'base.html' %}
{% block title %}Evento Gruppo{% endblock %}

{% block content %}
<div class="container-fluid py-2 py-md-4">
  <h2>Dettaglio Evento</h2>
  <div class="card">
    <div class="card-body">
      <h4>{{ evento.gruppo.matricola }} - {{ evento.get_tipo_display }}</h4>
      <p>{{ evento.descrizione }}</p>
      <a href="{% url 'automezzi:evento_gruppo_list' %}" class="btn btn-secondary">Indietro</a>
    </div>
  </div>
</div>
{% endblock %}
