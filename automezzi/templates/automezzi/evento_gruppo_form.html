{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Evento Gruppo{% endblock %}

{% block content %}
<div class="container-fluid py-2 py-md-4">
  <h2>{{ form.instance.pk|yesno:"Modifica,Nuovo" }} Evento</h2>
  <div class="card">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Salva</button>
        <a href="{% url 'automezzi:evento_gruppo_list' %}" class="btn btn-secondary">Annulla</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
