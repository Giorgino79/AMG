{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Manutenzione Gruppo{% endblock %}

{% block content %}
<div class="container-fluid py-2 py-md-4">
  <h2><i class="fas fa-wrench"></i> {{ form.instance.pk|yesno:"Modifica,Nuova" }} Manutenzione</h2>
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salva</button>
        <a href="{% url 'automezzi:manutenzione_gruppo_list' %}" class="btn btn-secondary">Annulla</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
